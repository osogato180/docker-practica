services:

  postgres:
    image: postgres:16-alpine

    container_name: postgres_db

    environment:
      POSTGRES_DB: demo_db
      POSTGRES_USER: demo_user
      POSTGRES_PASSWORD: demo_pass

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo_user -d demo_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./api

    container_name: fastapi_backend

    environment:
      DB_HOST: postgres
      DB_NAME: demo_db
      DB_USER: demo_user
      DB_PASSWORD: demo_pass

    ports:
      - "8000:8000"

    depends_on:
      postgres:
        condition: service_healthy

  streamlit:
    build: ./streamlit

    container_name: streamlit_app

    environment:
      API_URL: http://api:8000

    ports:
      - "8501:8501"

    depends_on:
      - api

volumes:
  postgres_data: